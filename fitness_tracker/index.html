<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Steve's Blueprint Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0d;
    --bg2: #0f1218;
    --card: #141820;
    --border: #1e2530;
    --border2: #252e3d;
    --accent: #c8f03c;
    --accent-dim: rgba(200,240,60,0.12);
    --accent-glow: rgba(200,240,60,0.25);
    --green: #3cf0a0;
    --green-dim: rgba(60,240,160,0.12);
    --blue: #3ca8f0;
    --blue-dim: rgba(60,168,240,0.12);
    --orange: #f0843c;
    --orange-dim: rgba(240,132,60,0.12);
    --red: #f03c3c;
    --red-dim: rgba(240,60,60,0.12);
    --text: #dde2ec;
    --muted: #5a6478;
    --muted2: #3a4256;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(8,10,13,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .nav-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: right;
  }

  .nav-day-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 8px;
    margin-top: 2px;
    display: inline-block;
  }

  /* TAB BAR */
  .tabbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(8,10,13,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    height: 60px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 18px; line-height: 1; }

  /* MAIN CONTENT */
  .main {
    padding-top: 56px;
    padding-bottom: 80px;
    min-height: 100vh;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* STREAK BANNER */
  .streak-banner {
    margin: 16px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .streak-banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
  }

  .streak-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .streak-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .streak-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .streak-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    flex-direction: column;
    gap: 1px;
  }

  .streak-dot.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .streak-dot.partial { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .streak-dot.today { border-color: var(--accent); animation: pulse-border 2s infinite; }

  @keyframes pulse-border {
    0%,100% { border-color: var(--accent); box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { border-color: var(--accent); box-shadow: 0 0 0 4px transparent; }
  }

  /* PROGRESS RING */
  .progress-ring-wrap {
    margin: 0 16px 16px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .ring-container {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }

  .ring-svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: var(--border2); stroke-width: 6; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }

  .ring-sub {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .ring-info { flex: 1; }

  .ring-info-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .ring-next {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .ring-next-task {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* TASK LIST */
  .task-section-label {
    padding: 16px 16px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .task-item {
    margin: 0 16px 8px;
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.3s;
    position: relative;
  }

  .task-item.active-task {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .task-item.done-task { opacity: 0.6; }
  .task-item.missed-task { border-color: var(--red); opacity: 0.7; }
  .task-item.late-task { border-color: var(--orange); }

  .task-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
  }

  .task-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 44px;
    flex-shrink: 0;
  }

  .task-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--border2);
  }

  .task-icon.eat { background: var(--green-dim); }
  .task-icon.train { background: var(--accent-dim); }
  .task-icon.sleep { background: var(--blue-dim); }
  .task-icon.supp { background: var(--orange-dim); }
  .task-icon.water { background: var(--blue-dim); }
  .task-icon.work { background: var(--muted2); }

  .task-body { flex: 1; }

  .task-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .task-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .task-status {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .task-status.done { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .task-status.missed { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .task-status.late { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .task-status.active { border-color: var(--accent); color: var(--accent); animation: pulse-circle 2s infinite; }

  @keyframes pulse-circle {
    0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }

  /* ACTIVE TASK EXPANDED */
  .task-action {
    padding: 0 16px 16px;
    display: none;
  }

  .task-item.active-task .task-action { display: block; }

  .countdown-bar {
    height: 4px;
    background: var(--border2);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }

  .countdown-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .btn-complete {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-complete:active { transform: scale(0.98); background: #a8cc2a; }

  .btn-late {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--orange);
    border: 1px solid var(--orange);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-late:active { background: var(--orange-dim); }

  /* WINDOW INDICATOR */
  .window-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .window-pill.open { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,240,60,0.3); }
  .window-pill.upcoming { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(60,168,240,0.3); }
  .window-pill.missed { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,60,60,0.3); }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* MEAL CARD */
  .meal-card {
    margin: 0 16px 8px;
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .meal-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .meal-card-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .meal-card-protein {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
  }

  .meal-card-name {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
  }

  .meal-card-detail {
    padding: 0 16px 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* WEEKLY VIEW */
  .week-grid {
    margin: 16px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .week-day-col { text-align: center; }

  .week-day-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .week-day-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .week-day-num.today { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .week-day-num.done { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .week-day-num.partial { border-color: var(--orange); background: var(--orange-dim); color: var(--orange); }
  .week-day-num.rest { border-color: var(--muted2); color: var(--muted); }

  .week-type-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin: 0 auto;
  }

  /* 2-DAY VIEW */
  .two-day-grid {
    margin: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .two-day-col {}

  .two-day-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .two-day-subhead {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .two-day-task {
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .two-day-task.done { opacity: 0.5; border-color: transparent; }

  .two-day-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .two-day-check.done { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .two-day-check.missed { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .two-day-check.late { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }

  .two-day-task-name {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }

  .two-day-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 16px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px 20px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.orange { background: var(--orange); color: #fff; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }

  .task-item { animation: fadeUp 0.3s ease both; }

  .complete-flash {
    animation: flash 0.4s ease;
  }

  @keyframes flash {
    0% { background: var(--accent-dim); }
    50% { background: rgba(200,240,60,0.3); }
    100% { background: var(--card); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 0; }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 16px 16px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-state .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--border2); letter-spacing: 2px; }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-logo">BLUEPRINT</div>
  <div class="nav-date" id="navDate">
    <div id="navDateText"></div>
    <div id="navDayType" class="nav-day-type"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN -->
<div class="main">

  <!-- ============ DAILY VIEW ============ -->
  <div class="view active" id="view-daily">

    <div class="streak-banner">
      <div>
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">Day Streak</div>
      </div>
      <div class="streak-dots" id="streakDots"></div>
    </div>

    <div class="progress-ring-wrap">
      <div class="ring-container">
        <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-sub">TODAY</div>
        </div>
      </div>
      <div class="ring-info">
        <div class="ring-info-title" id="ringTitle">Today's Plan</div>
        <div class="ring-next" id="ringNextLabel">Next task:</div>
        <div class="ring-next-task" id="ringNextTask">Loading...</div>
      </div>
    </div>

    <div class="task-section-label">SCHEDULE</div>
    <div id="taskList"></div>

    <div class="task-section-label" style="margin-top:8px;">TODAY'S MEALS</div>
    <div id="mealList"></div>

  </div>

  <!-- ============ 2-DAY VIEW ============ -->
  <div class="view" id="view-2day">
    <div class="two-day-grid" id="twoDayGrid"></div>
    <div class="task-section-label">MEALS — TODAY & TOMORROW</div>
    <div id="twoDayMeals"></div>
  </div>

  <!-- ============ WEEKLY VIEW ============ -->
  <div class="view" id="view-weekly">

    <div class="week-grid" id="weekGrid"></div>
    <div class="section-divider"></div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val accent" id="statStreak" style="color:var(--accent)">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statCompleted" style="color:var(--green)">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statMissed" style="color:var(--red)">0</div>
        <div class="stat-label">Missed</div>
      </div>
    </div>

    <div class="task-section-label">THIS WEEK'S OVERVIEW</div>
    <div id="weeklyOverview"></div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab active" onclick="switchTab('daily')" id="tab-daily">
    <span class="tab-icon">◉</span>
    <span>Today</span>
  </button>
  <button class="tab" onclick="switchTab('2day')" id="tab-2day">
    <span class="tab-icon">⊞</span>
    <span>2-Day</span>
  </button>
  <button class="tab" onclick="switchTab('weekly')" id="tab-weekly">
    <span class="tab-icon">⊟</span>
    <span>Week</span>
  </button>
</div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════

const DAY_TYPES = {
  0: 'rest',   // Sun
  1: 'ride',   // Mon
  2: 'lift',   // Tue
  3: 'ride',   // Wed
  4: 'lift',   // Thu
  5: 'lift',   // Fri
  6: 'ride',   // Sat
};

// Tasks per day type. time = minutes from midnight for window open
// window = minutes the window stays open
const TASK_TEMPLATES = {

const STATE_KEY = 'blueprint_v3';

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    return raw ? JSON.parse(raw) : { completions: {}, streak: 0, lastStreakDate: null };
  } catch(e) {
    return { completions: {}, streak: 0, lastStreakDate: null };
  }
}

function saveState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch(e) {}
}

let state = loadState();
let currentTab = 'daily';
let clockInterval = null;

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════

function todayKey(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function nowMinutes() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}

function fmtTime(mins) {
  const h = Math.floor(mins/60);
  const m = mins % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function dayType(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return DAY_TYPES[d.getDay()] || 'rest';
}

function dayName(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-US', { weekday:'long' });
}

function taskStatus(taskId, dateKey) {
  const completions = state.completions[dateKey] || {};
  return completions[taskId] || 'pending'; // pending | done | missed | late
}

function setTaskStatus(taskId, status, dateKey) {
  if (!state.completions[dateKey]) state.completions[dateKey] = {};
  state.completions[dateKey][taskId] = status;
  saveState(state);
}

function getWindowStatus(task) {
  const now = nowMinutes();
  const open = task.time;
  const close = task.time + task.window;
  if (now < open) return 'upcoming';
  if (now >= open && now <= close) return 'open';
  return 'expired';
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.className = 'toast', 2200);
}

function getDayTypeLabel(dt) {
  if (dt === 'ride') return `<span style="color:var(--accent);background:var(--accent-dim);border:1px solid rgba(200,240,60,0.3);padding:2px 8px;font-size:9px;letter-spacing:1px;">RIDE DAY</span>`;
  if (dt === 'lift') return `<span style="color:var(--blue);background:var(--blue-dim);border:1px solid rgba(60,168,240,0.3);padding:2px 8px;font-size:9px;letter-spacing:1px;">LIFT DAY</span>`;
  return `<span style="color:var(--muted);background:var(--muted2);padding:2px 8px;font-size:9px;letter-spacing:1px;">REST DAY</span>`;
}

// ══════════════════════════════════════════════
// STREAK CALCULATION
// ══════════════════════════════════════════════

function calcStreak() {
  let streak = 0;
  let d = new Date();
  d.setDate(d.getDate() - 1); // start from yesterday
  for (let i = 0; i < 60; i++) {
    const key = d.toISOString().slice(0,10);
    const comp = state.completions[key] || {};
    const dt = DAY_TYPES[d.getDay()];
    const tasks = TASK_TEMPLATES[dt] || TASK_TEMPLATES.rest;
    const hasAny = tasks.some(t => comp[t.id] === 'done' || comp[t.id] === 'late');
    if (!hasAny) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  // check if today has any completions — add to streak
  const todayComp = state.completions[todayKey()] || {};
  const todayDt = dayType();
  const todayTasks = TASK_TEMPLATES[todayDt] || TASK_TEMPLATES.rest;
  const todayHasAny = todayTasks.some(t => todayComp[t.id] === 'done' || todayComp[t.id] === 'late');
  if (todayHasAny) streak++;
  return streak;
}

function getDayCompletion(dateKey, offset=0) {
  const dt = (() => { const d = new Date(); d.setDate(d.getDate() + offset); return DAY_TYPES[d.getDay()]; })();
  const tasks = TASK_TEMPLATES[dt] || TASK_TEMPLATES.rest;
  const comp = state.completions[dateKey] || {};
  const done = tasks.filter(t => comp[t.id] === 'done' || comp[t.id] === 'late').length;
  const missed = tasks.filter(t => comp[t.id] === 'missed').length;
  return { done, missed, total: tasks.length };
}

// ══════════════════════════════════════════════
// DAILY VIEW RENDER
// ══════════════════════════════════════════════

function renderDaily() {
  const now = nowMinutes();
  const dk = todayKey();
  const dt = dayType();
  const tasks = TASK_TEMPLATES[dt] || TASK_TEMPLATES.rest;

  // Nav date
  const today = new Date();
  document.getElementById('navDateText').textContent = today.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
  document.getElementById('navDayType').innerHTML = getDayTypeLabel(dt);

  // Streak
  const streak = calcStreak();
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('statStreak').textContent = streak;

  // Streak dots (last 7 days)
  const dotsEl = document.getElementById('streakDots');
  dotsEl.innerHTML = '';
  const days = ['S','M','T','W','T','F','S'];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const dType = DAY_TYPES[d.getDay()];
    const { done, missed, total } = getDayCompletion(key);
    const isToday = i === 0;
    let cls = '';
    if (isToday) cls = 'today';
    else if (done > 0 && missed === 0) cls = 'done';
    else if (done > 0) cls = 'partial';
    const dot = document.createElement('div');
    dot.className = 'streak-dot ' + cls;
    dot.innerHTML = `<span>${days[d.getDay()]}</span>`;
    dotsEl.appendChild(dot);
  }

  // Progress ring
  const comp = state.completions[dk] || {};
  const doneCount = tasks.filter(t => comp[t.id] === 'done' || comp[t.id] === 'late').length;
  const pct = Math.round((doneCount / tasks.length) * 100);
  const circumference = 263.9;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';

  // Next task
  const nextTask = tasks.find(t => {
    const st = comp[t.id] || 'pending';
    return st === 'pending' || st === 'missed';
  });
  if (nextTask) {
    const ws = getWindowStatus(nextTask);
    if (ws === 'upcoming') {
      document.getElementById('ringNextLabel').textContent = 'Coming up at ' + fmtTime(nextTask.time) + ':';
    } else if (ws === 'open') {
      document.getElementById('ringNextLabel').textContent = '🟢 Active now:';
    } else {
      document.getElementById('ringNextLabel').textContent = 'Missed — can still complete:';
    }
    document.getElementById('ringNextTask').textContent = nextTask.name;
  } else {
    document.getElementById('ringNextLabel').textContent = '';
    document.getElementById('ringNextTask').textContent = pct === 100 ? '🏆 All tasks done!' : 'Great work today!';
  }

  const titleMap = { ride:'Ride Day — Power Zone', lift:'Lift Day — PPL', rest:'Rest Day' };
  document.getElementById('ringTitle').textContent = titleMap[dt];

  // Task list
  const listEl = document.getElementById('taskList');
  listEl.innerHTML = '';

  tasks.forEach((task, idx) => {
    const status = comp[task.id] || 'pending';
    const ws = getWindowStatus(task);
    const isActive = status === 'pending' && ws === 'open';
    const isMissed = status === 'missed' || (status === 'pending' && ws === 'expired');

    const item = document.createElement('div');
    item.className = 'task-item' + (isActive ? ' active-task' : '') + (status === 'done' ? ' done-task' : '') + (isMissed && status !== 'pending' ? ' missed-task' : '') + (status === 'late' ? ' late-task' : '');
    item.style.animationDelay = (idx * 30) + 'ms';
    item.id = 'task-' + task.id;

    // Status icon
    let statusIcon = '○';
    let statusCls = '';
    if (status === 'done') { statusIcon = '✓'; statusCls = 'done'; }
    else if (status === 'missed') { statusIcon = '✗'; statusCls = 'missed'; }
    else if (status === 'late') { statusIcon = '✓'; statusCls = 'late'; }
    else if (isActive) { statusIcon = '●'; statusCls = 'active'; }

    // Window pill
    let pillHtml = '';
    if (status === 'pending') {
      if (ws === 'open') pillHtml = `<div class="window-pill open"><div class="dot"></div>WINDOW OPEN</div>`;
      else if (ws === 'upcoming') pillHtml = `<div class="window-pill upcoming"><div class="dot"></div>OPENS AT ${fmtTime(task.time)}</div>`;
      else pillHtml = `<div class="window-pill missed"><div class="dot"></div>WINDOW CLOSED</div>`;
    } else if (status === 'missed') {
      pillHtml = `<div class="window-pill missed"><div class="dot"></div>MISSED — TAP TO MARK LATE</div>`;
    } else if (status === 'late') {
      pillHtml = `<div class="window-pill" style="background:var(--orange-dim);color:var(--orange);border:1px solid rgba(240,132,60,0.3)"><div class="dot"></div>COMPLETED LATE</div>`;
    }

    // Countdown for active
    let countdownHtml = '';
    if (isActive) {
      const closeTime = task.time + task.window;
      const minsLeft = closeTime - nowMinutes();
      const pctLeft = (minsLeft / task.window) * 100;
      countdownHtml = `
        <div class="countdown-bar"><div class="countdown-fill" id="cd-${task.id}" style="width:${pctLeft}%"></div></div>
        <div class="countdown-text" id="cdtext-${task.id}">Window closes in ${minsLeft} min · ${fmtTime(closeTime)}</div>
      `;
    }

    // Action button
    let actionHtml = '';
    if (status === 'pending' && ws === 'open') {
      actionHtml = `
        ${countdownHtml}
        <button class="btn-complete" onclick="completeTask('${task.id}', '${dk}', false)">
          ✓ MARK COMPLETE
        </button>
      `;
    } else if (status === 'pending' && ws === 'expired') {
      actionHtml = `<button class="btn-late" onclick="completeTask('${task.id}', '${dk}', true)">MARK AS LATE COMPLETION</button>`;
    } else if (status === 'missed') {
      actionHtml = `<button class="btn-late" onclick="completeTask('${task.id}', '${dk}', true)">MARK AS LATE COMPLETION</button>`;
    }

    item.innerHTML = `
      <div class="task-header" onclick="toggleTaskDetail('${task.id}')">
        <div class="task-time">${fmtTime(task.time)}</div>
        <div class="task-icon ${task.type}">${task.icon}</div>
        <div class="task-body">
          <div class="task-name">${task.name}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <div class="task-status ${statusCls}" onclick="event.stopPropagation(); handleStatusTap('${task.id}', '${dk}')">${statusIcon}</div>
      </div>
      <div class="task-action">
        ${pillHtml}
        ${actionHtml}
      </div>
    `;

    listEl.appendChild(item);
  });

  // Meal list
  renderMeals('mealList', 0);
}

function toggleTaskDetail(taskId) {
  const el = document.getElementById('task-' + taskId);
  if (el) el.classList.toggle('active-task');
}

function handleStatusTap(taskId, dateKey) {
  const status = taskStatus(taskId, dateKey);
  if (status === 'done' || status === 'late') {
    // Undo
    setTaskStatus(taskId, 'pending', dateKey);
    showToast('Unmarked ↩', 'orange');
    renderDaily();
  } else if (status === 'pending') {
    const ws = getWindowStatus(TASK_TEMPLATES[dayType()].find(t => t.id === taskId) || {time:0,window:60});
    if (ws === 'open') completeTask(taskId, dateKey, false);
    else completeTask(taskId, dateKey, true);
  }
}

function completeTask(taskId, dateKey, isLate) {
  setTaskStatus(taskId, isLate ? 'late' : 'done', dateKey);
  const item = document.getElementById('task-' + taskId);
  if (item) item.classList.add('complete-flash');
  showToast(isLate ? '✓ Marked late — still counts!' : '✓ Task complete!', isLate ? 'orange' : '');
  setTimeout(() => renderDaily(), 400);
}

function renderMeals(containerId, dayOffset) {
  const d = new Date(); d.setDate(d.getDate() + dayOffset);
  const dow = d.getDay();
  const meals = MEALS[dow] || MEALS[0];
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';

  const mealOrder = ['breakfast','lunch','snack','dinner'];
  const mealLabel = { breakfast:'Breakfast', lunch:'Lunch', snack:'Snack (5:30pm)', dinner:'Dinner' };

  mealOrder.forEach(key => {
    const m = meals[key];
    if (!m) return;
    const card = document.createElement('div');
    card.className = 'meal-card';
    let batchHtml = '';
    if (m.batch) batchHtml = `<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:4px;">↻ ${m.batch}</div>`;
    if (m.leftover) batchHtml = `<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--green);margin-top:4px;">♻ Leftovers</div>`;
    card.innerHTML = `
      <div class="meal-card-header">
        <div class="meal-card-type">${mealLabel[key]}</div>
        <div class="meal-card-protein">${m.protein} protein · ${m.cal} cal</div>
      </div>
      <div class="meal-card-name">${m.name}</div>
      <div class="meal-card-detail">${m.detail}${batchHtml}</div>
    `;
    el.appendChild(card);
  });
}

        ${getDayTypeLabel(dt)}
      </div>
    `;

    tasks.forEach(task => {
      const status = comp[task.id] || 'pending';
      const ws = getWindowStatus(task);
      let checkCls = '';
      let checkIcon = '';
      if (status === 'done') { checkCls = 'done'; checkIcon = '✓'; }
      else if (status === 'late') { checkCls = 'late'; checkIcon = '✓'; }
      else if (status === 'missed') { checkCls = 'missed'; checkIcon = '✗'; }
      else if (offset === 0 && ws === 'open') { checkCls = 'active'; }

      const taskEl = document.createElement('div');
      taskEl.className = 'two-day-task' + (status === 'done' || status === 'late' ? ' done' : '');
      if (offset === 0) {
        taskEl.onclick = () => { handleStatusTap(task.id, dk); render2Day(); };
        taskEl.style.cursor = 'pointer';
      }
      taskEl.innerHTML = `
        <div class="two-day-check ${checkCls}">${checkIcon}</div>
        <div class="two-day-task-name">${task.icon} ${task.name}</div>
        <div class="two-day-time">${fmtTime(task.time)}</div>
      `;
      col.appendChild(taskEl);
    });

    grid.appendChild(col);
  });

  // Meals
  const mealsEl = document.getElementById('twoDayMeals');
  mealsEl.innerHTML = '';
  [0,1].forEach(offset => {
    const label = offset === 0 ? 'TODAY' : 'TOMORROW';
    const lbl = document.createElement('div');
    lbl.className = 'task-section-label';
    lbl.textContent = label;
    mealsEl.appendChild(lbl);
    const wrapper = document.createElement('div');
    wrapper.id = 'meals2day-' + offset;
    mealsEl.appendChild(wrapper);
    renderMeals('meals2day-' + offset, offset);
  });
}

// ══════════════════════════════════════════════
// WEEKLY VIEW
// ══════════════════════════════════════════════

function renderWeekly() {
  const weekGrid = document.getElementById('weekGrid');
  weekGrid.innerHTML = '';

  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const today = new Date();
  const todayDow = today.getDay();

  // Get Monday of current week
  const monday = new Date(today);
  monday.setDate(today.getDate() - todayDow + (todayDow === 0 ? -6 : 1));

  let weekCompleted = 0;
  let weekMissed = 0;

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dk = d.toISOString().slice(0,10);
    const dt = DAY_TYPES[d.getDay()];
    const { done, missed, total } = getDayCompletion(dk);
    weekCompleted += done;
    weekMissed += missed;

    const isToday = dk === todayKey();
    const isFuture = d > today;

    let numCls = '';
    if (isToday) numCls = 'today';
    else if (isFuture) numCls = '';
    else if (done > 0 && missed === 0) numCls = 'done';
    else if (done > 0) numCls = 'partial';
    else numCls = 'rest';

    const dotColor = dt === 'ride' ? 'var(--accent)' : dt === 'lift' ? 'var(--blue)' : 'var(--muted2)';

    const col = document.createElement('div');
    col.className = 'week-day-col';
    col.innerHTML = `
      <div class="week-day-label">${days[d.getDay()]}</div>
      <div class="week-day-num ${numCls}">${d.getDate()}</div>
      <div class="week-type-dot" style="background:${dotColor}"></div>
      ${!isFuture ? `<div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:4px;">${done}/${total}</div>` : ''}
    `;
    weekGrid.appendChild(col);
  }

  document.getElementById('statCompleted').textContent = weekCompleted;
  document.getElementById('statMissed').textContent = weekMissed;

  // Weekly overview — show today's full plan
  const overviewEl = document.getElementById('weeklyOverview');
  overviewEl.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dk = d.toISOString().slice(0,10);
    const dt = DAY_TYPES[d.getDay()];
    const comp = state.completions[dk] || {};
    const tasks = TASK_TEMPLATES[dt] || TASK_TEMPLATES.rest;
    const isToday = dk === todayKey();
    const { done, total } = getDayCompletion(dk);

    const dayBlock = document.createElement('div');
    dayBlock.style.margin = '0 16px 12px';
    dayBlock.style.background = 'var(--card)';
    dayBlock.style.border = `1px solid ${isToday ? 'var(--accent)' : 'var(--border)'}`;
    dayBlock.style.overflow = 'hidden';

    const dtColor = dt === 'ride' ? 'var(--accent)' : dt === 'lift' ? 'var(--blue)' : 'var(--muted)';
    const dtLabel = dt.toUpperCase();

    dayBlock.innerHTML = `
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:${isToday?'var(--accent)':'var(--text)'}">${days[d.getDay()]} ${d.getDate()}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:${dtColor};margin-left:8px;letter-spacing:1px;">${dtLabel}</span>
        </div>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${done}/${total} ▾</span>
      </div>
      <div style="display:${isToday?'block':'none'}">
        ${tasks.map(t => {
          const s = comp[t.id] || 'pending';
          const ic = s==='done'?'✓':s==='late'?'✓':s==='missed'?'✗':'○';
          const c = s==='done'?'var(--accent)':s==='late'?'var(--orange)':s==='missed'?'var(--red)':'var(--muted)';
          return `<div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center">
            <span style="color:${c};font-size:12px;width:14px">${ic}</span>
            <span style="font-size:12px;color:var(--text)">${t.icon} ${t.name}</span>
            <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${fmtTime(t.time)}</span>
          </div>`;
        }).join('')}
      </div>
    `;
    overviewEl.appendChild(dayBlock);
  }
}

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'daily') renderDaily();
  else if (tab === '2day') render2Day();
  else if (tab === 'weekly') renderWeekly();
}

// ══════════════════════════════════════════════
// AUTO-MARK MISSED + CLOCK
// ══════════════════════════════════════════════

function autoMarkMissed() {
  const dk = todayKey();
  const dt = dayType();
  const tasks = TASK_TEMPLATES[dt] || TASK_TEMPLATES.rest;
  const now = nowMinutes();
  tasks.forEach(task => {
    const status = taskStatus(task.id, dk);
    const closeTime = task.time + task.window;
    if (status === 'pending' && now > closeTime) {
      setTaskStatus(task.id, 'missed', dk);
    }
  });
}

function startClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    autoMarkMissed();
    if (currentTab === 'daily') renderDaily();
  }, 60000); // every minute
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

autoMarkMissed();
renderDaily();
startClock();
</script>
